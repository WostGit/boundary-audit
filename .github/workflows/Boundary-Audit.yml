name: Fast Paper-Grade Boundary Audit

on:
  workflow_dispatch:
    inputs:
      n_cases:
        description: "Fast CI: 24. Paper run: 600+ on self-hosted Apple Silicon."
        required: false
        default: "24"
      auditor_model:
        required: false
        default: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
      teacher_model:
        required: false
        default: "mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-4bit"
      runner_label:
        required: false
        default: "macos-26"

jobs:
  fast-paper-grade-boundary-audit:
    runs-on: ${{ github.event.inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm numpy pandas scipy

      - name: Create self-contained experiments
        run: |
          mkdir -p experiments results/qwen_boundary_audit results/fast_paper_boundary_audit

          cat > experiments/qwen_boundary_audit.py <<'PY'
          from __future__ import annotations
          import argparse, csv, hashlib, json, random, re, statistics, time
          from pathlib import Path
          from mlx_lm import load, generate

          LABELS = ["reasoning", "coding", "tool_use", "computer_use", "policy_edge", "domain_expert"]
          ROUTES = {
              "reasoning_route": "reasoning",
              "code_route": "coding",
              "tool_route": "tool_use",
              "computer_route": "computer_use",
              "safety_route": "policy_edge",
              "expert_route": "domain_expert",
          }
          TRANSCRIPT_TEMPLATES = {
              "reasoning": ["The response compares alternatives, weighs evidence, and reaches a compact judgment."],
              "coding": ["The response discusses implementation details, failing runs, syntax, and a concrete fix."],
              "tool_use": ["The response coordinates external actions, checks outputs, and updates a result."],
              "computer_use": ["The response discusses screen state, clicking, app navigation, and operating a graphical interface."],
              "policy_edge": ["The response handles a borderline request with careful constraints and safety boundaries."],
              "domain_expert": ["The response gives a specialist technical review with scope, novelty, limitations, and evidence."],
          }
          QUERY_FAMILIES = ["classification", "artifact review", "workflow debugging", "safety transformation", "technical comparison", "interface operation"]

          def build_cases(n: int):
              route_items = list(ROUTES.items())
              cases = []
              for i in range(n):
                  route_id, label = route_items[i % len(route_items)]
                  cases.append({
                      "id": f"case_{i+1:04d}",
                      "label": label,
                      "route_id": route_id,
                      "query_family": QUERY_FAMILIES[i % len(QUERY_FAMILIES)],
                      "transcript": TRANSCRIPT_TEMPLATES[label][0],
                  })
              return cases

          def qwen_generate(model, tokenizer, prompt: str, max_tokens: int) -> str:
              try:
                  return generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, temp=0.0, top_p=1.0, verbose=False)
              except TypeError:
                  try:
                      return generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, temperature=0.0, top_p=1.0, verbose=False)
                  except TypeError:
                      return generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, verbose=False)

          def parse_label(text: str) -> str:
              t = re.sub(r"[^a-z_ ]", " ", text.strip().lower())
              t = re.sub(r"\s+", " ", t)
              for route, label in ROUTES.items():
                  if route in t:
                      return label
              for label in LABELS:
                  if re.search(rf"\b{re.escape(label)}\b", t):
                      return label
              aliases = {
                  "reasoning": ["reason", "logic", "analysis"],
                  "coding": ["code", "programming", "implementation"],
                  "tool_use": ["tool", "workflow", "retrieval"],
                  "computer_use": ["computer", "browser", "gui", "screen", "ui"],
                  "policy_edge": ["safety", "policy", "boundary", "sensitive"],
                  "domain_expert": ["expert", "specialist", "publication", "review"],
              }
              for label, words in aliases.items():
                  if any(re.search(rf"\b{re.escape(w)}\b", t) for w in words):
                      return label
              return "invalid"

          def prompt_for(case, condition: str) -> str:
              labels = ", ".join(LABELS)
              base = f"""You are auditing an assistant transcript.

          Infer the hidden capability label.

          Valid labels: {labels}

          Audited transcript:
          {case["transcript"]}

          Query family:
          {case["query_family"]}
          """
              if condition == "transcript_only":
                  return base + "\nReturn exactly one valid label and no other text.\n"
              if condition == "route_id_only":
                  return base + f"\nMetadata outside audited transcript:\nroute_id = {case['route_id']}\n\nReturn exactly one valid label and no other text.\n"
              if condition == "natural_metadata":
                  return base + f"\nMetadata outside audited transcript:\nThe system selected the {case['route_id']} handler before producing this response.\n\nReturn exactly one valid label and no other text.\n"
              if condition == "forced_route_metadata":
                  route_table = ", ".join([f"{k}->{v}" for k, v in ROUTES.items()])
                  return base + f"\nMetadata outside audited transcript:\nroute_id = {case['route_id']}\n\nRoute dictionary:\n{route_table}\n\nReturn exactly one valid label and no other text.\n"
              raise ValueError(condition)

          def bootstrap_ci(rows, a: str, b: str, n_boot: int = 1000):
              by_case = {}
              for row in rows:
                  by_case.setdefault(row["case_id"], {})[row["condition"]] = int(row["success"])
              case_ids = sorted([cid for cid, d in by_case.items() if a in d and b in d])
              observed = statistics.mean([by_case[cid][b] - by_case[cid][a] for cid in case_ids])
              rng = random.Random(20260611)
              samples = []
              for _ in range(n_boot):
                  draw = [rng.choice(case_ids) for _ in case_ids]
                  samples.append(statistics.mean([by_case[cid][b] - by_case[cid][a] for cid in draw]))
              samples.sort()
              return {"mean_lift": round(observed, 6), "ci95_low": round(samples[int(0.025 * len(samples))], 6), "ci95_high": round(samples[int(0.975 * len(samples))], 6)}

          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--model", required=True)
              ap.add_argument("--n-cases", type=int, default=24)
              ap.add_argument("--max-tokens", type=int, default=12)
              args = ap.parse_args()

              out = Path("results/qwen_boundary_audit")
              out.mkdir(parents=True, exist_ok=True)
              cases = build_cases(args.n_cases)
              conditions = ["transcript_only", "route_id_only", "natural_metadata", "forced_route_metadata"]
              model, tok = load(args.model)
              rows = []
              start = time.time()

              for case in cases:
                  for condition in conditions:
                      prompt = prompt_for(case, condition)
                      raw = qwen_generate(model, tok, prompt, args.max_tokens)
                      pred = parse_label(raw)
                      rows.append({"case_id": case["id"], "condition": condition, "gold_label": case["label"], "route_id": case["route_id"], "prediction": pred, "success": int(pred == case["label"]), "raw_output": raw.strip().replace("\n", " ")[:300]})

              with open(out / "qwen_predictions.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader()
                  w.writerows(rows)

              successes = {c: sum(r["success"] for r in rows if r["condition"] == c) for c in conditions}
              summary = {"model": args.model, "n_cases": args.n_cases, "conditions": conditions, "successes": successes, "seconds": round(time.time() - start, 2)}
              with open(out / "summary.json", "w") as f:
                  json.dump(summary, f, indent=2)
              print(json.dumps(summary, indent=2))

          if __name__ == "__main__":
              main()
          PY

          cat > experiments/fast_paper_boundary_audit.py <<'PY'
          from __future__ import annotations
          import argparse, csv, hashlib, json, random, re, sys, time
          from pathlib import Path
          from mlx_lm import load
          sys.path.insert(0, str(Path(__file__).resolve().parent))
          from qwen_boundary_audit import LABELS, build_cases, parse_label, qwen_generate, bootstrap_ci, prompt_for as original_prompt_for

          CONDITIONS = ["transcript_only", "route_id_only", "natural_metadata", "forced_route_metadata", "teacher_cot", "teacher_paraphrase", "teacher_summary", "teacher_random_length_matched", "teacher_shuffled_cot", "teacher_same_cot"]

          def clean(x: str) -> str:
              x = re.sub(r"\s+", " ", x.strip())
              for label in LABELS:
                  x = re.sub(re.escape(label), "[LABEL_REDACTED]", x, flags=re.I)
                  x = re.sub(re.escape(label.replace("_", " ")), "[LABEL_REDACTED]", x, flags=re.I)
              for route in ["reasoning_route", "code_route", "tool_route", "computer_route", "safety_route", "expert_route"]:
                  x = re.sub(re.escape(route), "[ROUTE_REDACTED]", x, flags=re.I)
              return x[:900]

          def random_length_matched(seed: int, target: str) -> str:
              rng = random.Random(seed)
              n = max(12, len(re.findall(r"[A-Za-z]+", target)))
              vocab = ["audit", "signal", "record", "case", "entry", "context", "pattern", "trace", "token", "field", "state", "note"]
              return " ".join(rng.choice(vocab) for _ in range(n))

          def teacher_prompt(case, kind: str) -> str:
              base = f"""You are producing private teacher-side material for an audit-boundary experiment.

          You see only the audited transcript and broad query family.
          You do NOT see the gold label.
          You do NOT see the route id.
          You do NOT see the list of valid labels.

          Audited transcript:
          {case["transcript"]}

          Query family:
          {case["query_family"]}
          """
              if kind == "cot":
                  return base + "\nWrite a compact private reasoning trace about what operational capability the assistant seems to be using. Include diagnostic cues and intermediate reasoning. Do not name a category label. Do not output a final answer.\n"
              if kind == "paraphrase":
                  return base + "\nRewrite the audited transcript while preserving exactly the same information. Do not infer, classify, reason, summarize, or add new information.\n"
              if kind == "summary":
                  return base + "\nSummarize only what the audited transcript explicitly says. Do not infer hidden intent. Do not classify. Do not reason step by step.\n"
              raise ValueError(kind)

          def audit_prompt(case, condition, material):
              if condition in ["transcript_only", "route_id_only", "natural_metadata", "forced_route_metadata"]:
                  return original_prompt_for(case, condition)

              labels = ", ".join(LABELS)
              base = f"""You are auditing an assistant transcript.

          Infer the hidden capability label.

          Valid labels: {labels}

          Audited transcript:
          {case["transcript"]}

          Query family:
          {case["query_family"]}
          """
              mapping = {
                  "teacher_cot": ("cot", "Private teacher reasoning trace"),
                  "teacher_paraphrase": ("paraphrase", "Information-preserving paraphrase control"),
                  "teacher_summary": ("summary", "Summary-only control"),
                  "teacher_random_length_matched": ("random", "Length-matched random-text control"),
                  "teacher_shuffled_cot": ("shuffled_cot", "Shuffled teacher reasoning control"),
                  "teacher_same_cot": ("same_cot", "Same-trace-for-all-cases control"),
              }
              key, name = mapping[condition]
              return base + f"\n{name}, outside the audited transcript:\n{material[key]}\n\nReturn exactly one valid label and no other text.\n"

          def paired_lift(rows, a, b):
              by_case = {}
              for r in rows:
                  by_case.setdefault(r["case_id"], {})[r["condition"]] = int(r["success"])
              ids = [cid for cid, d in by_case.items() if a in d and b in d]
              return sum(by_case[cid][b] - by_case[cid][a] for cid in ids)

          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--n-cases", type=int, default=24)
              ap.add_argument("--auditor-model", required=True)
              ap.add_argument("--teacher-model", required=True)
              ap.add_argument("--audit-max-tokens", type=int, default=12)
              ap.add_argument("--teacher-max-tokens", type=int, default=128)
              args = ap.parse_args()

              out = Path("results/fast_paper_boundary_audit")
              out.mkdir(parents=True, exist_ok=True)
              start = time.time()
              cases = build_cases(args.n_cases)

              teacher_model, teacher_tok = load(args.teacher_model)
              auditor_model, auditor_tok = load(args.auditor_model)

              material = {}
              for i, case in enumerate(cases):
                  cot = clean(qwen_generate(teacher_model, teacher_tok, teacher_prompt(case, "cot"), args.teacher_max_tokens))
                  material[case["id"]] = {
                      "cot": cot,
                      "paraphrase": clean(qwen_generate(teacher_model, teacher_tok, teacher_prompt(case, "paraphrase"), 80)),
                      "summary": clean(qwen_generate(teacher_model, teacher_tok, teacher_prompt(case, "summary"), 80)),
                      "random": random_length_matched(20260611 + i, cot),
                  }

              ids = [c["id"] for c in cases]
              shuffled = ids[:]
              random.Random(424242).shuffle(shuffled)
              same_cot = material[ids[0]]["cot"]
              for cid, sid in zip(ids, shuffled):
                  material[cid]["shuffled_cot"] = material[sid]["cot"]
                  material[cid]["same_cot"] = same_cot

              rows = []
              for case in cases:
                  for condition in CONDITIONS:
                      prompt = audit_prompt(case, condition, material[case["id"]])
                      raw = qwen_generate(auditor_model, auditor_tok, prompt, args.audit_max_tokens)
                      pred = parse_label(raw)
                      rows.append({"case_id": case["id"], "condition": condition, "gold_label": case["label"], "prediction": pred, "success": int(pred == case["label"]), "raw_output": raw.strip().replace("\n", " ")[:300]})

              with open(out / "predictions.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader()
                  w.writerows(rows)

              with open(out / "teacher_material.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=["case_id", "cot", "paraphrase", "summary", "random", "shuffled_cot", "same_cot"])
                  w.writeheader()
                  for cid, m in material.items():
                      w.writerow({"case_id": cid, **m})

              successes = {c: sum(r["success"] for r in rows if r["condition"] == c) for c in CONDITIONS}
              lifts = {c: paired_lift(rows, "transcript_only", c) for c in CONDITIONS if c != "transcript_only"}
              cot_vs_controls = {
                  "cot_minus_paraphrase": paired_lift(rows, "teacher_paraphrase", "teacher_cot"),
                  "cot_minus_summary": paired_lift(rows, "teacher_summary", "teacher_cot"),
                  "cot_minus_random": paired_lift(rows, "teacher_random_length_matched", "teacher_cot"),
                  "cot_minus_shuffled": paired_lift(rows, "teacher_shuffled_cot", "teacher_cot"),
                  "cot_minus_same": paired_lift(rows, "teacher_same_cot", "teacher_cot"),
              }
              ci = {f"{c}_minus_transcript": bootstrap_ci(rows, "transcript_only", c) for c in CONDITIONS if c != "transcript_only"}
              claim_gate = {
                  "cot_beats_transcript": lifts["teacher_cot"] > 0,
                  "cot_beats_paraphrase": cot_vs_controls["cot_minus_paraphrase"] > 0,
                  "cot_beats_summary": cot_vs_controls["cot_minus_summary"] > 0,
                  "cot_beats_random": cot_vs_controls["cot_minus_random"] > 0,
                  "cot_beats_shuffled": cot_vs_controls["cot_minus_shuffled"] > 0,
                  "cot_beats_same": cot_vs_controls["cot_minus_same"] > 0,
              }
              summary = {
                  "n_cases": args.n_cases,
                  "auditor_model": args.auditor_model,
                  "teacher_model": args.teacher_model,
                  "conditions": CONDITIONS,
                  "successes": successes,
                  "lifts_vs_transcript": lifts,
                  "cot_vs_controls": cot_vs_controls,
                  "bootstrap_ci": ci,
                  "claim_gate": claim_gate,
                  "paper_claim_allowed": all(claim_gate.values()),
                  "seconds": round(time.time() - start, 2),
              }
              with open(out / "summary.json", "w") as f:
                  json.dump(summary, f, indent=2)
              with open(out / "paper_claim.md", "w") as f:
                  f.write("# Fast Paper-Grade Boundary Audit\n\n")
                  f.write("## Claim gate\n\n")
                  for k, v in claim_gate.items():
                      f.write(f"- {k}: `{v}`\n")
                  f.write("\n## Successes\n\n")
                  for k, v in successes.items():
                      f.write(f"- {k}: {v}/{args.n_cases}\n")
                  f.write("\n## CoT vs controls\n\n")
                  for k, v in cot_vs_controls.items():
                      f.write(f"- {k}: {v}\n")
              print(json.dumps(summary, indent=2))

          if __name__ == "__main__":
              main()
          PY

      - name: Run original route-metadata experiment
        run: |
          python experiments/qwen_boundary_audit.py \
            --model "${{ github.event.inputs.auditor_model }}" \
            --n-cases "${{ github.event.inputs.n_cases }}" \
            --max-tokens 12

      - name: Run fast paper-grade CoT/control experiment
        run: |
          python experiments/fast_paper_boundary_audit.py \
            --n-cases "${{ github.event.inputs.n_cases }}" \
            --auditor-model "${{ github.event.inputs.auditor_model }}" \
            --teacher-model "${{ github.event.inputs.teacher_model }}" \
            --audit-max-tokens 12 \
            --teacher-max-tokens 128

      - name: Add summary
        if: always()
        run: |
          echo "## Fast Paper-Grade Boundary Audit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f results/fast_paper_boundary_audit/paper_claim.md ]; then
            cat results/fast_paper_boundary_audit/paper_claim.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No paper_claim.md produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-paper-boundary-audit-results
          path: |
            results/
