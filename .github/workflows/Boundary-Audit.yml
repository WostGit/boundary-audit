name: Fast Paper-Grade Boundary Audit

on:
  workflow_dispatch:
    inputs:
      n_cases:
        description: "Fast CI: 24. Paper run: 600+ on self-hosted Apple Silicon."
        required: false
        default: "24"
      auditor_model:
        required: false
        default: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
      teacher_model:
        required: false
        default: "mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-MLX"
      runner_label:
        description: "Use macos-14-xlarge or a self-hosted Apple Silicon runner."
        required: false
        default: "macos-14-xlarge"

jobs:
  fast-paper-grade-boundary-audit:
    runs-on: ${{ github.event.inputs.runner_label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm numpy pandas scipy

      - name: Add fast paper-grade experiment
        run: |
          mkdir -p experiments results/fast_paper_boundary_audit

          cat > experiments/fast_paper_boundary_audit.py <<'PY'
          from __future__ import annotations

          import argparse, csv, hashlib, json, random, re, statistics, time
          from pathlib import Path
          from mlx_lm import load

          from qwen_boundary_audit import (
              LABELS,
              build_cases,
              parse_label,
              qwen_generate,
              bootstrap_ci,
              prompt_for as original_prompt_for,
          )

          CONDITIONS = [
              "transcript_only",
              "route_id_only",
              "natural_metadata",
              "forced_route_metadata",
              "teacher_cot",
              "teacher_paraphrase",
              "teacher_summary",
              "teacher_random_length_matched",
              "teacher_shuffled_cot",
              "teacher_same_cot",
          ]

          def clean(x: str) -> str:
              x = re.sub(r"\s+", " ", x.strip())
              for label in LABELS:
                  x = re.sub(re.escape(label), "[LABEL_REDACTED]", x, flags=re.I)
                  x = re.sub(re.escape(label.replace("_", " ")), "[LABEL_REDACTED]", x, flags=re.I)
              for route in [
                  "reasoning_route",
                  "code_route",
                  "tool_route",
                  "computer_route",
                  "safety_route",
                  "expert_route",
              ]:
                  x = re.sub(re.escape(route), "[ROUTE_REDACTED]", x, flags=re.I)
              return x[:900]

          def random_length_matched(seed: int, target: str) -> str:
              rng = random.Random(seed)
              n = max(12, len(re.findall(r"[A-Za-z]+", target)))
              vocab = [
                  "audit", "signal", "record", "case", "entry", "context",
                  "pattern", "trace", "token", "field", "state", "note"
              ]
              return " ".join(rng.choice(vocab) for _ in range(n))

          def teacher_prompt(case, kind: str) -> str:
              base = f"""
          You are producing private teacher-side material for an audit-boundary experiment.

          You see only the audited transcript and broad query family.
          You do NOT see the gold label.
          You do NOT see the route id.
          You do NOT see the list of valid labels.

          Audited transcript:
          {case["transcript"]}

          Query family:
          {case["query_family"]}
          """

              if kind == "cot":
                  return base + """
          Write a compact private reasoning trace about what operational capability the assistant seems to be using.
          Include diagnostic cues and intermediate reasoning.
          Do not name a category label.
          Do not output a final answer.
          """
              if kind == "paraphrase":
                  return base + """
          Rewrite the audited transcript while preserving exactly the same information.
          Do not infer, classify, reason, summarize, or add new information.
          """
              if kind == "summary":
                  return base + """
          Summarize only what the audited transcript explicitly says.
          Do not infer hidden intent.
          Do not classify.
          Do not reason step by step.
          """
              raise ValueError(kind)

          def audit_prompt(case, condition, material):
              if condition in [
                  "transcript_only",
                  "route_id_only",
                  "natural_metadata",
                  "forced_route_metadata",
              ]:
                  return original_prompt_for(case, condition)

              labels = ", ".join(LABELS)
              base = f"""
          You are auditing an assistant transcript.

          Infer the hidden capability label.

          Valid labels: {labels}

          Audited transcript:
          {case["transcript"]}

          Query family:
          {case["query_family"]}
          """

              if condition == "teacher_cot":
                  extra = material["cot"]
                  name = "Private teacher reasoning trace"
              elif condition == "teacher_paraphrase":
                  extra = material["paraphrase"]
                  name = "Information-preserving paraphrase control"
              elif condition == "teacher_summary":
                  extra = material["summary"]
                  name = "Summary-only control"
              elif condition == "teacher_random_length_matched":
                  extra = material["random"]
                  name = "Length-matched random-text control"
              elif condition == "teacher_shuffled_cot":
                  extra = material["shuffled_cot"]
                  name = "Shuffled teacher reasoning control"
              elif condition == "teacher_same_cot":
                  extra = material["same_cot"]
                  name = "Same-trace-for-all-cases control"
              else:
                  raise ValueError(condition)

              return base + f"""

          {name}, outside the audited transcript:
          {extra}

          Return exactly one valid label and no other text.
          """

          def paired_lift(rows, a, b):
              by_case = {}
              for r in rows:
                  by_case.setdefault(r["case_id"], {})[r["condition"]] = int(r["success"])
              ids = [cid for cid, d in by_case.items() if a in d and b in d]
              return sum(by_case[cid][b] - by_case[cid][a] for cid in ids)

          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--n-cases", type=int, default=24)
              ap.add_argument("--auditor-model", required=True)
              ap.add_argument("--teacher-model", required=True)
              ap.add_argument("--audit-max-tokens", type=int, default=12)
              ap.add_argument("--teacher-max-tokens", type=int, default=128)
              args = ap.parse_args()

              out = Path("results/fast_paper_boundary_audit")
              out.mkdir(parents=True, exist_ok=True)

              start = time.time()
              cases = build_cases(args.n_cases)

              teacher_model, teacher_tok = load(args.teacher_model)
              auditor_model, auditor_tok = load(args.auditor_model)

              material = {}
              for i, case in enumerate(cases):
                  cot = clean(qwen_generate(
                      teacher_model,
                      teacher_tok,
                      teacher_prompt(case, "cot"),
                      args.teacher_max_tokens,
                  ))
                  material[case["id"]] = {
                      "cot": cot,
                      "paraphrase": clean(qwen_generate(
                          teacher_model,
                          teacher_tok,
                          teacher_prompt(case, "paraphrase"),
                          80,
                      )),
                      "summary": clean(qwen_generate(
                          teacher_model,
                          teacher_tok,
                          teacher_prompt(case, "summary"),
                          80,
                      )),
                      "random": random_length_matched(20260611 + i, cot),
                  }

              ids = [c["id"] for c in cases]
              shuffled = ids[:]
              random.Random(424242).shuffle(shuffled)
              same_cot = material[ids[0]]["cot"]
              for cid, sid in zip(ids, shuffled):
                  material[cid]["shuffled_cot"] = material[sid]["cot"]
                  material[cid]["same_cot"] = same_cot

              with open(out / "teacher_material.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(
                      f,
                      fieldnames=[
                          "case_id", "cot", "paraphrase", "summary",
                          "random", "shuffled_cot", "same_cot",
                      ],
                  )
                  w.writeheader()
                  for cid, m in material.items():
                      w.writerow({"case_id": cid, **m})

              rows = []
              prompt_rows = []

              for case in cases:
                  for condition in CONDITIONS:
                      prompt = audit_prompt(case, condition, material[case["id"]])
                      raw = qwen_generate(auditor_model, auditor_tok, prompt, args.audit_max_tokens)
                      pred = parse_label(raw)
                      success = int(pred == case["label"])

                      prompt_rows.append({
                          "case_id": case["id"],
                          "condition": condition,
                          "prompt_sha256": hashlib.sha256(prompt.encode()).hexdigest(),
                          "gold_label": case["label"],
                      })

                      rows.append({
                          "case_id": case["id"],
                          "condition": condition,
                          "gold_label": case["label"],
                          "prediction": pred,
                          "success": success,
                          "raw_output": raw.strip().replace("\n", " ")[:300],
                      })

              with open(out / "predictions.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader()
                  w.writerows(rows)

              with open(out / "prompt_hashes.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=list(prompt_rows[0].keys()))
                  w.writeheader()
                  w.writerows(prompt_rows)

              successes = {
                  c: sum(r["success"] for r in rows if r["condition"] == c)
                  for c in CONDITIONS
              }

              lifts = {
                  c: paired_lift(rows, "transcript_only", c)
                  for c in CONDITIONS
                  if c != "transcript_only"
              }

              cot_vs_controls = {
                  "cot_minus_paraphrase": paired_lift(rows, "teacher_paraphrase", "teacher_cot"),
                  "cot_minus_summary": paired_lift(rows, "teacher_summary", "teacher_cot"),
                  "cot_minus_random": paired_lift(rows, "teacher_random_length_matched", "teacher_cot"),
                  "cot_minus_shuffled": paired_lift(rows, "teacher_shuffled_cot", "teacher_cot"),
                  "cot_minus_same": paired_lift(rows, "teacher_same_cot", "teacher_cot"),
              }

              ci = {}
              for c in [
                  "route_id_only",
                  "natural_metadata",
                  "forced_route_metadata",
                  "teacher_cot",
                  "teacher_paraphrase",
                  "teacher_summary",
                  "teacher_random_length_matched",
                  "teacher_shuffled_cot",
                  "teacher_same_cot",
              ]:
                  ci[f"{c}_minus_transcript"] = bootstrap_ci(rows, "transcript_only", c)

              claim_gate = {
                  "cot_beats_transcript": lifts["teacher_cot"] > 0,
                  "cot_beats_paraphrase": cot_vs_controls["cot_minus_paraphrase"] > 0,
                  "cot_beats_summary": cot_vs_controls["cot_minus_summary"] > 0,
                  "cot_beats_random": cot_vs_controls["cot_minus_random"] > 0,
                  "cot_beats_shuffled": cot_vs_controls["cot_minus_shuffled"] > 0,
                  "cot_beats_same": cot_vs_controls["cot_minus_same"] > 0,
              }

              summary = {
                  "n_cases": args.n_cases,
                  "auditor_model": args.auditor_model,
                  "teacher_model": args.teacher_model,
                  "conditions": CONDITIONS,
                  "successes": successes,
                  "lifts_vs_transcript": lifts,
                  "cot_vs_controls": cot_vs_controls,
                  "bootstrap_ci": ci,
                  "claim_gate": claim_gate,
                  "seconds": round(time.time() - start, 2),
                  "paper_claim_allowed": all(claim_gate.values()),
                  "interpretation": (
                      "Fast paper-grade CI run. The publishable claim is allowed only if "
                      "teacher_cot beats transcript-only and all same-extra-text controls: "
                      "paraphrase, summary, random length-matched, shuffled CoT, and same CoT."
                  ),
              }

              with open(out / "summary.json", "w", encoding="utf-8") as f:
                  json.dump(summary, f, indent=2)

              with open(out / "paper_claim.md", "w", encoding="utf-8") as f:
                  f.write("# Fast Paper-Grade Boundary Audit\n\n")
                  f.write("This is a fast CI-scale run, not the final paper-scale estimate.\n\n")
                  f.write("## Claim gate\n\n")
                  for k, v in claim_gate.items():
                      f.write(f"- {k}: `{v}`\n")
                  f.write("\n## Successes\n\n")
                  for k, v in successes.items():
                      f.write(f"- {k}: {v}/{args.n_cases}\n")
                  f.write("\n## CoT vs controls\n\n")
                  for k, v in cot_vs_controls.items():
                      f.write(f"- {k}: {v}\n")
                  f.write("\n## Interpretation\n\n")
                  f.write(summary["interpretation"] + "\n")

              print(json.dumps(summary, indent=2))

          if __name__ == "__main__":
              main()
          PY

      - name: Run Lean proof/audit if present
        run: |
          if [ -f lakefile.lean ] || [ -f lakefile.toml ]; then
            curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
            echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
            "$HOME/.elan/bin/lake" build
          else
            echo "No Lean project found; skipping Lean build."
          fi

          if [ -f scripts/audit.sh ]; then
            bash scripts/audit.sh
          else
            echo "No scripts/audit.sh found; skipping original audit shell script."
          fi

      - name: Run original route-metadata experiment
        run: |
          python experiments/qwen_boundary_audit.py \
            --model "${{ github.event.inputs.auditor_model }}" \
            --n-cases "${{ github.event.inputs.n_cases }}" \
            --max-tokens 12

      - name: Run fast paper-grade CoT/control experiment
        run: |
          python experiments/fast_paper_boundary_audit.py \
            --n-cases "${{ github.event.inputs.n_cases }}" \
            --auditor-model "${{ github.event.inputs.auditor_model }}" \
            --teacher-model "${{ github.event.inputs.teacher_model }}" \
            --audit-max-tokens 12 \
            --teacher-max-tokens 128

      - name: Add summary
        run: |
          echo "## Fast Paper-Grade Boundary Audit" >> "$GITHUB_STEP_SUMMARY"
          cat results/fast_paper_boundary_audit/paper_claim.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fast-paper-boundary-audit-results
          path: |
            results/
